# ---------------------------------------------------------------------------
# Framework configuration
# Every value here can be overridden at runtime, e.g.:
#   mvn test -DdeviceName="Pixel_7_API_34" -DplatformVersion="14.0"
# ---------------------------------------------------------------------------

# Appium server
appiumServerUrl=http://127.0.0.1:4723

# Device / emulator
deviceName=Android Emulator
platformVersion=
udid=

# App under test (SauceLabs Swag Labs sample app)
# Provide the local .apk path...
app=apps/Android.SauceLabs.Mobile.Sample.app.2.7.1.apk
# ...or comment out 'app' above and target an already-installed app:
appPackage=com.swaglabsmobileapp
appActivity=com.swaglabsmobileapp.MainActivity

# Timeouts (seconds)
implicitWait=0
explicitWait=20
newCommandTimeout=120
