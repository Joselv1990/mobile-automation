name: Android E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # Fast feedback: compiles the framework and validates the BDD glue on every push.
  build:
    name: Build & compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile (tests not executed without a device)
        run: mvn -B clean test-compile

  # Full run on a real Android emulator. Triggered manually to keep CI minutes low.
  emulator-tests:
    name: Appium tests on emulator (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        api-level: [ 31 ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium + UiAutomator2 driver
        run: |
          npm install -g appium@2
          appium driver install uiautomator2

      - name: Download Swag Labs sample app
        run: |
          mkdir -p apps
          curl -L -o apps/Android.SauceLabs.Mobile.Sample.app.2.7.1.apk \
            https://github.com/saucelabs/sample-app-mobile/releases/download/2.7.1/Android.SauceLabs.Mobile.Sample.app.2.7.1.apk

      - name: Start Appium server
        run: appium --log appium.log &

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_5
          script: mvn -B test -Dtags="@smoke"

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-api-${{ matrix.api-level }}
          path: target/cucumber-report/
